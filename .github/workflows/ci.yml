name: Lumis technical checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test:all-local
      - name: Export production web bundle
        run: pnpm --filter @lumis/mobile exec expo export --platform web --output-dir dist-ci
        env:
          EXPO_PUBLIC_DICE_RITUAL: "1"
